<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=3840, height=86, initial-scale=1, user-scalable=no">
  <title>Office Ticker — News (Vertical Swipe, Multi)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:   #010101;
      --text: #ffffff;
      --frame-h: 86px;
      --anim-ms: 600ms;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 3840px;
      height: var(--frame-h);
      background: var(--bg);
      color: var(--text);
      font-family: "Figtree", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      font-weight: 600;
      overflow: hidden;
    }
    .frame {
      width: 100%;
      height: var(--frame-h);
      overflow: hidden;
      position: relative;
    }
    /* Two stacked rows: next on top (initially hidden above viewport), current below.
       Stack starts shifted up by one frame so current is visible.
       Animating translate down by one frame slides current off-bottom and next into view. */
    .stack {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      transform: translateY(calc(-1 * var(--frame-h)));
      will-change: transform;
    }
    .stack.animating {
      transition: transform var(--anim-ms) ease-in-out;
    }
    /* Each row is one frame high; contains multiple headline items in a flex row */
    .row {
      width: 100%;
      height: var(--frame-h);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 32px;
      font-size: 32px;
      line-height: 1;
      letter-spacing: 0.01em;
      overflow: hidden;
    }
    .headline {
      padding: 0 24px;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="stack" id="stack">
      <div class="row" id="row-next">—</div>
      <div class="row" id="row-current">Loading…</div>
    </div>
  </div>

  <script>
    // ===== Configuration =====
    const ROTATION_INTERVAL_MS = 10 * 1000;     // 10s between page swaps
    const ANIMATION_MS = 600;                    // must match CSS --anim-ms
    const FEED_URL = 'news.xml';
    const FEED_RELOAD_MS = 5 * 60 * 1000;
    const SIDE_PADDING_PX = 32 * 2;              // .row left + right padding
    const ITEM_PADDING_PX = 24 * 2;              // .headline left + right padding

    // ===== State =====
    let headlines = ['Loading news…'];
    let currentIdx = 0;
    const stack = document.getElementById('stack');
    const rowNext = document.getElementById('row-next');
    const rowCurrent = document.getElementById('row-current');

    // Off-DOM canvas for fast width measurement (no layout/reflow cost)
    const measureCtx = document.createElement('canvas').getContext('2d');
    function measureHeadlineWidth(text) {
      measureCtx.font = '600 32px "Figtree", "Helvetica Neue", Arial, sans-serif';
      return measureCtx.measureText(text).width + ITEM_PADDING_PX;
    }

    // ===== Page builder =====
    // Given a starting index, greedily picks consecutive headlines (wrapping
    // around the array if needed) until the next one wouldn't fit. Returns
    // { items: string[], endIdx: number } where endIdx is the index for the
    // next page to start at.
    function buildPage(startIdx) {
      const containerWidth = document.querySelector('.frame').clientWidth - SIDE_PADDING_PX;
      const items = [];
      let total = 0;
      for (let i = 0; i < headlines.length; i++) {
        const idx = (startIdx + i) % headlines.length;
        const w = measureHeadlineWidth(headlines[idx]);
        // First headline is always included (even if it overflows — better than blank)
        if (items.length === 0 || total + w <= containerWidth) {
          items.push(headlines[idx]);
          total += w;
        } else {
          break;
        }
      }
      return { items: items, endIdx: (startIdx + items.length) % headlines.length };
    }

    // ===== Render a row =====
    function renderRow(rowEl, items) {
      rowEl.innerHTML = '';
      items.forEach(function (text) {
        const el = document.createElement('div');
        el.className = 'headline';
        el.textContent = text;
        rowEl.appendChild(el);
      });
    }

    // ===== news.xml loader =====
    async function loadHeadlines() {
      try {
        const res = await fetch(FEED_URL + '?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) return;
        const text = await res.text();
        const doc = new DOMParser().parseFromString(text, 'application/xml');
        const titles = Array.from(doc.querySelectorAll('item > title'))
          .map(function (t) { return (t.textContent || '').trim(); })
          .filter(function (t) { return t.length > 0; });
        if (titles.length === 0) return;
        headlines = titles;
        if (currentIdx >= headlines.length) currentIdx = 0;
        // On first load, redraw current row immediately
        const initial = buildPage(currentIdx);
        renderRow(rowCurrent, initial.items);
        // Pre-render the next row above
        const next = buildPage(initial.endIdx);
        renderRow(rowNext, next.items);
      } catch (e) { /* swallow */ }
    }

    // ===== Rotation =====
    function rotate() {
      const currentPage = buildPage(currentIdx);
      if (currentPage.endIdx === currentIdx) {
        // Edge case: only one headline that fills the whole row — no rotation needed
        setTimeout(rotate, ROTATION_INTERVAL_MS);
        return;
      }
      // Render the next-row content (the page that will become visible)
      const nextPage = buildPage(currentPage.endIdx);
      renderRow(rowNext, nextPage.items);

      // Animate downward: current off bottom, next into visible position
      stack.classList.add('animating');
      stack.style.transform = 'translateY(0)';

      setTimeout(function () {
        // Animation done — instantly reset stack + swap content
        stack.classList.remove('animating');
        stack.style.transform = 'translateY(calc(-1 * var(--frame-h)))';
        currentIdx = currentPage.endIdx;
        // What was "next" is now "current"; pre-build the row above it for the next cycle
        renderRow(rowCurrent, nextPage.items);
        const afterNext = buildPage(nextPage.endIdx);
        renderRow(rowNext, afterNext.items);
        setTimeout(rotate, ROTATION_INTERVAL_MS);
      }, ANIMATION_MS);
    }

    // ===== Boot =====
    (async function () {
      await loadHeadlines();
      // Allow fonts to settle before measuring (otherwise first measurement uses fallback metrics)
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
        // Re-measure / re-render once Figtree has loaded
        const initial = buildPage(currentIdx);
        renderRow(rowCurrent, initial.items);
        const next = buildPage(initial.endIdx);
        renderRow(rowNext, next.items);
      }
      setTimeout(rotate, ROTATION_INTERVAL_MS);
      setInterval(loadHeadlines, FEED_RELOAD_MS);
    })();
  </script>
</body>
</html>
