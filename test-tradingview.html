<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=3840, height=86, initial-scale=1, user-scalable=no">
  <title>Office Ticker — TradingView</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 3840px;
      height: 86px;
      background: #010101;
      overflow: hidden;
    }
    .tradingview-widget-container,
    .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }
    /* The widget injects an iframe; force it to fill our viewport */
    .tradingview-widget-container iframe {
      width: 100% !important;
      height: 100% !important;
    }
    /* Hide TradingView's "Markets by TradingView" attribution row (small text below the ticker tape) */
    .tradingview-widget-copyright {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <div class="tradingview-widget-copyright"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {
      "symbols": [
        {"description": "S&P 500", "proName": "SP:SPX"},
        {"description": "NASDAQ",  "proName": "NASDAQ:NDX"},
        {"description": "TA-125",  "proName": "TASE:TA125"},
        {"description": "BTC",     "proName": "BINANCE:BTCUSDT"},
        {"description": "ETH",     "proName": "BINANCE:ETHUSDT"},
        {"description": "BNB",     "proName": "BINANCE:BNBUSDT"},
        {"description": "XRP",     "proName": "BINANCE:XRPUSDT"},
        {"description": "SOL",     "proName": "BINANCE:SOLUSDT"}
      ],
      "showSymbolLogo": false,
      "isTransparent": false,
      "displayMode": "regular",
      "colorTheme": "dark",
      "locale": "en"
    }
    </script>
  </div>

  <script>
    // Allow URL params to toggle display mode and theme without re-publishing
    //   ?mode=regular|compact|adaptive
    //   ?theme=dark|light
    //   ?logos=1|0   — show symbol logos (small icon per symbol)
    (function () {
      const params = new URLSearchParams(window.location.search);
      const mode  = params.get('mode');
      const theme = params.get('theme');
      const logos = params.get('logos');
      if (!mode && !theme && !logos) return;

      // Rewrite the embedded script's config before it loads
      const scriptEl = document.querySelector('script[src*="embed-widget-ticker-tape"]');
      if (!scriptEl) return;
      let config;
      try { config = JSON.parse(scriptEl.textContent); } catch { return; }
      if (mode)  config.displayMode = mode;
      if (theme) config.colorTheme  = theme;
      if (logos) config.showSymbolLogo = logos === '1';
      scriptEl.textContent = JSON.stringify(config);
    })();
  </script>
</body>
</html>
