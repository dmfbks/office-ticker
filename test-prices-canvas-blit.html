<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Ticker — Prices (Canvas pixel blit)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #010101;
      overflow: hidden;
    }
    /* Canvas is fixed-position — NEVER transformed/moved.
       Browser doesn't need to composite/transform it, so no GPU smoothing applies. */
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="ticker"></canvas>

  <script>
    // Pixel-blit approach: the visible canvas stays static.
    // Content lives in a wide off-screen buffer canvas, twice the set width
    // (for the seamless loop trick). Each frame, drawImage copies a viewport-
    // sized window from the buffer to the visible canvas at exact (0,0) with
    // a 1:1 source-to-dest ratio (no scaling = no GPU sampling).
    //
    // The offset advances by integer pixels. The canvas itself never moves
    // in the DOM, so the browser's GPU compositor sees a static element and
    // doesn't apply any transform-related smoothing.
    (function () {
      const canvas = document.getElementById('ticker');
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;

      const URL_PARAMS = new URLSearchParams(window.location.search);
      const SPEED_PX_PER_SEC = (function () {
        const v = parseInt(URL_PARAMS.get('speed'), 10);
        return (isFinite(v) && v > 0 && v <= 500) ? v : 30;
      })();
      const FPS_CAP = (function () {
        const v = parseInt(URL_PARAMS.get('fps'), 10);
        return (isFinite(v) && v > 0 && v <= 120) ? v : 0;
      })();
      const FRAME_MS = FPS_CAP > 0 ? (1000 / FPS_CAP) : 0;

      const COLORS = {
        bg: '#010101', text: '#ffffff',
        up: '#22c55e', down: '#ef4444',
      };

      const ITEMS = [
        { symbol: 'S&P 500', price: '7,554',    change: '-0.61%', direction: 'down' },
        { symbol: 'NASDAQ',  price: '30,571',   change: '+0.19%', direction: 'up'   },
        { symbol: 'TA-125',  price: '4,188',    change: '-0.90%', direction: 'down' },
        { symbol: 'BTC',     price: '$63,869',  change: '-4.93%', direction: 'down' },
        { symbol: 'ETH',     price: '$1,783',   change: '-4.98%', direction: 'down' },
        { symbol: 'BNB',     price: '$602.55',  change: '-6.27%', direction: 'down' },
        { symbol: 'XRP',     price: '$1.18',    change: '-5.49%', direction: 'down' },
        { symbol: 'SOL',     price: '$69.76',   change: '-7.30%', direction: 'down' },
      ];

      // Off-screen buffer holds the full ticker content (rendered twice for seamless loop)
      const buffer = document.createElement('canvas');
      const bctx = buffer.getContext('2d');
      bctx.imageSmoothingEnabled = false;

      let fontSize = 0, intraItemGap = 0, interItemGap = 0;
      let setWidth = 0;

      function setFont(weight) {
        bctx.font = weight + ' ' + fontSize + 'px "Figtree", "Helvetica Neue", Arial, sans-serif';
      }

      function currentTime() {
        const d = new Date();
        return new Intl.DateTimeFormat('en-GB', {
          timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit', hour12: false
        }).format(d);
      }

      function priceItemWidth(it) {
        setFont('600');
        return Math.round(
          bctx.measureText(it.symbol).width + intraItemGap +
          bctx.measureText(it.price).width + intraItemGap +
          bctx.measureText(it.change).width + interItemGap
        );
      }

      function brandingWidth() {
        const logoSize = Math.round(fontSize * 0.85);
        const logoPad = Math.round(fontSize * 0.5);
        setFont('600');
        return Math.round(logoSize + logoPad + bctx.measureText(currentTime()).width + interItemGap);
      }

      function drawPriceItem(it, x, y) {
        let cursor = x;
        bctx.textBaseline = 'middle';
        setFont('600');
        bctx.fillStyle = COLORS.text;
        bctx.fillText(it.symbol, Math.round(cursor), y);
        cursor += bctx.measureText(it.symbol).width + intraItemGap;
        bctx.fillText(it.price, Math.round(cursor), y);
        cursor += bctx.measureText(it.price).width + intraItemGap;
        bctx.fillStyle = it.direction === 'up' ? COLORS.up : COLORS.down;
        bctx.fillText(it.change, Math.round(cursor), y);
      }

      function drawBranding(logo, x, y) {
        const logoSize = Math.round(fontSize * 0.85);
        const logoPad = Math.round(fontSize * 0.5);
        bctx.globalAlpha = 0.9;
        bctx.drawImage(logo, Math.round(x), Math.round(y - logoSize / 2), logoSize, logoSize);
        bctx.globalAlpha = 1.0;
        setFont('600');
        bctx.fillStyle = COLORS.text;
        bctx.fillText(currentTime(), Math.round(x + logoSize + logoPad), y);
      }

      function buildBuffer(logo) {
        // Match visible canvas size in display pixels
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        fontSize = Math.round(Math.max(32, Math.min(104, canvas.height * 0.10)));
        intraItemGap = Math.round(fontSize * 0.5);
        interItemGap = Math.round(fontSize * 1.4);

        const widths = ITEMS.map(priceItemWidth);
        const brandW = brandingWidth();
        setWidth = widths.reduce(function (a, b) { return a + b; }, 0) + brandW;

        // Buffer holds two copies of the content (the seamless-loop trick)
        buffer.width = setWidth * 2;
        buffer.height = canvas.height;
        bctx.imageSmoothingEnabled = false;

        bctx.fillStyle = COLORS.bg;
        bctx.fillRect(0, 0, buffer.width, buffer.height);

        const y = Math.round(buffer.height / 2);
        let cursor = 0;
        for (let copy = 0; copy < 2; copy++) {
          for (let i = 0; i < ITEMS.length; i++) {
            drawPriceItem(ITEMS[i], cursor, y);
            cursor += widths[i];
          }
          drawBranding(logo, cursor, y);
          cursor += brandW;
        }
      }

      let position = 0;     // pixel offset into buffer (always integer)
      let lastTimeMs = 0;
      let lastFrameMs = 0;

      function tick(now) {
        // FPS throttle
        if (FPS_CAP > 0 && (now - lastFrameMs) < FRAME_MS) {
          requestAnimationFrame(tick);
          return;
        }
        lastFrameMs = now;

        if (lastTimeMs === 0) lastTimeMs = now;
        const dt = (now - lastTimeMs) / 1000;
        lastTimeMs = now;

        // Advance position. Math.floor (not round) keeps motion monotonic.
        position = (position + SPEED_PX_PER_SEC * dt);
        if (position >= setWidth) position -= setWidth;
        const intPos = Math.floor(position);

        // Blit a viewport-width window from the buffer onto the visible canvas.
        // Same source and destination size = NO scaling = no GPU sampling.
        ctx.drawImage(
          buffer,
          intPos, 0, canvas.width, canvas.height,   // source rect
          0, 0, canvas.width, canvas.height         // dest rect (always at origin)
        );

        requestAnimationFrame(tick);
      }

      const logo = new Image();
      logo.onload = function () {
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            setTimeout(function () {
              buildBuffer(logo);
              requestAnimationFrame(tick);
            }, 100);
          });
        } else {
          setTimeout(function () {
            buildBuffer(logo);
            requestAnimationFrame(tick);
          }, 800);
        }
      };
      logo.onerror = function () {
        const blank = new Image();
        setTimeout(function () {
          buildBuffer(blank);
          requestAnimationFrame(tick);
        }, 500);
      };
      logo.src = 'logo.svg';

      // Rebuild buffer every 60s so the time stays current
      setInterval(function () { buildBuffer(logo); }, 60 * 1000);
      window.addEventListener('resize', function () { buildBuffer(logo); });
    })();
  </script>
</body>
</html>
