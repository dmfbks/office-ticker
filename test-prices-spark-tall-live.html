<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" id="vp" content="width=3840, height=172, initial-scale=1, user-scalable=no">
  <script>
    (function () {
      const p = new URLSearchParams(location.search);
      const w = parseInt(p.get('w'), 10);
      if (w && w > 0) {
        document.getElementById('vp').setAttribute(
          'content', 'width=' + w + ', height=172, initial-scale=1, user-scalable=no'
        );
      }
      window._W = (w && w > 0) ? w : 3840;
      // Wall-distribution params:
      //   ?offset=N  — where this panel starts in the global wall (px). Default 0.
      //   ?total=N   — total wall width (px). Default = w (standalone panel).
      // For floor 8: left ?w=3440&offset=0&total=6192 ; right ?w=2752&offset=3440&total=6192
      window._OFFSET = Math.max(0, parseInt(p.get('offset'), 10) || 0);
      window._TOTAL  = Math.max(window._W, parseInt(p.get('total'), 10) || window._W);
      // ?tz=Asia/Jerusalem  — override the timezone used by the brand-corner clock.
      window._TZ = p.get('tz') || 'Asia/Jerusalem';
      // ?reload=N — automatically reload the page every N minutes (cache-busted).
      window._RELOAD_MIN = Math.max(0, parseInt(p.get('reload'), 10) || 0);
    })();
  </script>

  <title>Office Ticker — Prices (Tall + Live Sparkline)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:   #010101;
      --text: #ffffff;
      --up:   #22c55e;
      --down: #ef4444;
      --screen-w: 3840px;
      --screen-h: 172px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: var(--screen-w);
      height: var(--screen-h);
      background: var(--bg);
      color: var(--text);
      font-family: "Figtree", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      font-weight: 600;
      overflow: hidden;
    }
    .ticker {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 34px;
    }
    .greeting { color: var(--text); }
    .time { font-variant-numeric: tabular-nums; }

    .items {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: 100%;
      overflow: hidden;
    }
    .item {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 6px;
      white-space: nowrap;
    }
    /* Brand corner is just another .item — it appears first in the wall so it
       naturally lives on the leftmost panel. Same vertical alignment, no spark. */
    .item.brand { gap: 4px; }
    .item.brand img { height: 34px; width: 34px; opacity: 0.9; margin-right: 12px; }
    .item.brand .sep { opacity: 0.4; margin: 0 10px; }
    .symbol { color: var(--text); font-weight: 600; margin-right: 14px; }
    .price  { color: var(--text); font-weight: 600; margin-right: 12px;
              font-variant-numeric: tabular-nums; }
    .change { font-weight: 600; font-variant-numeric: tabular-nums; }
    .change.up   { color: var(--up); }
    .change.down { color: var(--down); }

    .spark {
      width: 110px;
      height: 64px;
      margin-right: 14px;
      flex-shrink: 0;
      overflow: visible;
    }

    /* Narrow panels (right side @1376px) can't fit 4 sparkline items at the
       default size — auto-compact: smaller font, smaller spark, tighter margins. */
    @media (max-width: 2000px) {
      .ticker { font-size: 26px; padding: 0 10px; }
      .item.brand img { height: 26px; width: 26px; margin-right: 10px; }
      .item.brand { gap: 6px; }
      .item { padding: 4px 6px; }
      .symbol { margin-right: 8px; }
      .price  { margin-right: 8px; }
      .spark  { width: 70px; height: 48px; margin-right: 8px; }
      .spark-line { stroke-width: 2.4; }
      .spark-baseline { stroke-width: 1.4; stroke-dasharray: 4 3; }
    }
    .spark-baseline {
      stroke: rgba(255, 255, 255, 0.45);
      stroke-width: 2;
      stroke-dasharray: 5 4;
      fill: none;
    }
    /* Line is fully drawn by default. The redraw animation only runs when JS
       adds the .redraw class — which happens on first paint and again whenever
       the underlying data actually changes. No looping cycle means no
       every-few-seconds fade-out flicker. */
    .spark-line {
      fill: none;
      stroke-width: 3.2;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .spark.up   .spark-line { stroke: var(--up); }
    .spark.down .spark-line { stroke: var(--down); }
    .spark-line.redraw {
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      opacity: 0;
      animation: spark-redraw 5s cubic-bezier(0.4, 0.05, 0.7, 0.55) forwards;
    }
    @keyframes spark-redraw {
      0%   { stroke-dashoffset: 800; opacity: 0; }
      8%   { stroke-dashoffset: 800; opacity: 1; }
      100% { stroke-dashoffset: 0;   opacity: 1; }
    }

    /* Dot + radar ring are always visible & always animating — they don't tie
       to the line's redraw cycle, so they keep the chart looking "alive"
       without any periodic fade-to-black. */
    .spark-ring, .spark-dot { pointer-events: none; }
    .spark.up   .spark-dot  { fill: var(--up); }
    .spark.down .spark-dot  { fill: var(--down); }
    .spark.up   .spark-ring { fill: none; stroke: var(--up); }
    .spark.down .spark-ring { fill: none; stroke: var(--down); }
    .spark-dot  { animation: dot-pulse 3s ease-in-out infinite; }
    .spark-ring { animation: ring-ping 5s ease-out infinite; }
    @keyframes dot-pulse {
      0%, 100% { r: 3.5; }
      50%      { r: 4.8; }
    }
    @keyframes ring-ping {
      0%   { r: 4;  stroke-opacity: 0.9; stroke-width: 3; }
      70%  { stroke-opacity: 0.3; stroke-width: 1.5; }
      100% { r: 22; stroke-opacity: 0;   stroke-width: 0.8; }
    }

    .colon { animation: colonBlink 1s infinite; }
    @keyframes colonBlink {
      0%, 49.9% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      font-size: 36px;
    }
  </style>
</head>
<body>
  <div class="ticker" id="ticker">
    <div class="items" id="items"><div class="empty">Loading…</div></div>
  </div>

  <script>
    const SCREEN_WIDTH = window._W || 3840;
    const OFFSET = window._OFFSET || 0;
    const TOTAL  = window._TOTAL  || SCREEN_WIDTH;
    document.documentElement.style.setProperty('--screen-w', SCREEN_WIDTH + 'px');

    const CRYPTO_ORDER = ['BTC', 'ETH', 'BNB', 'XRP', 'SOL'];
    const INDEX_ORDER  = ['S&P 500', 'NASDAQ', 'TA-35', 'USD'];

    // Sentinel symbol used for the brand corner so it's treated as a regular item
    // in the wall slice math.
    const BRAND_SYMBOL = '__BRAND__';

    // Build the global wall ordering: brand → all crypto (in CRYPTO_ORDER) →
    // all indices (in INDEX_ORDER). Brand is anchored at wall position 0 so it
    // naturally lives on the leftmost panel.
    function buildWall(cryptoItems, indexItems) {
      return [{ symbol: BRAND_SYMBOL, brand: true }].concat(cryptoItems, indexItems);
    }

    // Decide which slice of the wall this panel owns, based on (offset, w, total).
    // Round to the nearest boundary so the wall is partitioned cleanly with no
    // item appearing twice or being dropped.
    function panelSlice(wall) {
      const n = wall.length;
      const startIdx = Math.round((OFFSET / TOTAL) * n);
      const endIdx   = Math.round(((OFFSET + SCREEN_WIDTH) / TOTAL) * n);
      return wall.slice(startIdx, Math.max(endIdx, startIdx + 1));
    }

    function formatCryptoPrice(p) {
      if (p >= 100)  return '$' + Math.round(p).toLocaleString('en-US');
      if (p >= 1)    return '$' + p.toFixed(2);
      return '$' + p.toFixed(4);
    }
    function formatIndexPrice(name, p) {
      if (name === 'USD') return '₪' + p.toFixed(3);
      return Math.round(p).toLocaleString('en-US');
    }
    function formatChange(c) {
      const sign = c >= 0 ? '+' : '';
      return sign + c.toFixed(2) + '%';
    }

    function sparklinePoints(values, width, height, padY) {
      padY = padY || 6;
      const min = Math.min.apply(null, values);
      const max = Math.max.apply(null, values);
      const range = max - min || 1;
      const inner = height - 2 * padY;
      return values.map(function (v, i) {
        const x = (i / Math.max(values.length - 1, 1)) * width;
        const y = padY + (1 - (v - min) / range) * inner;
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
    }
    function baselineY(values, height, padY) {
      padY = padY || 6;
      const min = Math.min.apply(null, values);
      const max = Math.max.apply(null, values);
      const range = max - min || 1;
      const inner = height - 2 * padY;
      return padY + (1 - (values[0] - min) / range) * inner;
    }
    function lastPoint(values, width, height, padY) {
      padY = padY || 6;
      const min = Math.min.apply(null, values);
      const max = Math.max.apply(null, values);
      const range = max - min || 1;
      const inner = height - 2 * padY;
      const lastV = values[values.length - 1];
      return { x: width, y: padY + (1 - (lastV - min) / range) * inner };
    }
    function sparklineSVG(values, direction) {
      const W = 140, H = 80;
      // Defensive: if we got a single point or empty, render a flat midline
      if (!values || values.length < 2) {
        values = [1, 1];
      }
      const points = sparklinePoints(values, W, H);
      const by = baselineY(values, H);
      const lp = lastPoint(values, W, H);
      return '<svg class="spark ' + direction + '" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
        '<line class="spark-baseline" x1="0" y1="' + by.toFixed(1) + '" x2="' + W + '" y2="' + by.toFixed(1) + '"/>' +
        '<polyline class="spark-line" points="' + points + '"/>' +
        '<circle class="spark-ring" cx="' + lp.x.toFixed(1) + '" cy="' + lp.y.toFixed(1) + '" r="4"/>' +
        '<circle class="spark-dot"  cx="' + lp.x.toFixed(1) + '" cy="' + lp.y.toFixed(1) + '" r="3.5"/>' +
        '</svg>';
    }

    function buildBrandItem() {
      const brand = document.createElement('div');
      brand.className = 'item brand';
      brand.innerHTML =
        '<img src="logo.svg" alt="Fireblocks" />' +
        '<span class="greeting" id="greeting"></span>' +
        '<span class="sep">·</span>' +
        '<span class="time"><span id="time-h"></span><span class="colon">:</span><span id="time-m"></span></span>';
      return brand;
    }

    // Compute the time + weekday in the configured timezone (default Asia/Jerusalem)
    // so the display doesn't depend on the rendering device's system clock.
    function updateClock() {
      const greetingEl = document.getElementById('greeting');
      if (!greetingEl) return;
      const tz = window._TZ;
      const now = new Date();
      try {
        const dayFmt  = new Intl.DateTimeFormat('en-US', { timeZone: tz, weekday: 'long' });
        const timeFmt = new Intl.DateTimeFormat('en-US', {
          timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false,
        });
        const dayName = dayFmt.format(now);
        const parts = timeFmt.formatToParts(now);
        const hh = (parts.find(function (p) { return p.type === 'hour';   }) || {}).value || '00';
        const mm = (parts.find(function (p) { return p.type === 'minute'; }) || {}).value || '00';
        greetingEl.textContent = 'Happy ' + dayName + '!';
        document.getElementById('time-h').textContent = (hh === '24') ? '00' : hh;
        document.getElementById('time-m').textContent = mm;
      } catch (e) {
        // Fall back to device-local time if Intl chokes on the timezone string
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        greetingEl.textContent = 'Happy ' + days[now.getDay()] + '!';
        document.getElementById('time-h').textContent = String(now.getHours()).padStart(2, '0');
        document.getElementById('time-m').textContent = String(now.getMinutes()).padStart(2, '0');
      }
    }

    function cryptoItem(symbol, data) {
      const change = data.change_24h || 0;
      const direction = change >= 0 ? 'up' : 'down';
      return {
        symbol: symbol,
        price: formatCryptoPrice(data.price),
        change: formatChange(change),
        direction: direction,
        spark: data.spark || [],
      };
    }
    function indexItem(name, data) {
      const prev = data.previous_close;
      const change = ((data.price - prev) / prev) * 100;
      const direction = change >= 0 ? 'up' : 'down';
      return {
        symbol: name,
        price: formatIndexPrice(name, data.price),
        change: formatChange(change),
        direction: direction,
        spark: data.spark || [],
      };
    }

    // Track the last spark array per symbol so we only fire the one-shot redraw
    // animation for items whose data actually moved between fetches.
    const lastSpark = {};
    const REDRAW_MS = 5000;          // matches the .spark-line.redraw animation duration
    const STAGGER_MS = 200;          // gap between item redraws when refreshing

    function shuffleInPlace(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      return arr;
    }

    function triggerRedraw(el) {
      const line = el.querySelector('.spark-line');
      if (!line) return;
      // Remove → force reflow → re-add so the animation restarts cleanly even
      // mid-flight from a prior trigger.
      line.classList.remove('redraw');
      void line.offsetWidth;
      line.classList.add('redraw');
    }

    // Cache of DOM nodes per symbol so we can update text + SVG points in place
    // rather than wiping innerHTML on every data refresh. Full innerHTML rebuild
    // restarts every CSS animation, which caused the visible flicker the user
    // saw when indices.json updated every ~10 min.
    const itemRefs = {};

    function symbolsKey(items) {
      return items.map(function (it) { return it.symbol; }).join(',');
    }

    function buildItem(it) {
      if (it.brand) return buildBrandItem();
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML =
        '<span class="symbol">' + it.symbol + '</span>' +
        sparklineSVG(it.spark, it.direction) +
        '<span class="price">' + it.price + '</span>' +
        '<span class="change ' + it.direction + '">' + it.change + '</span>';
      return el;
    }

    function updateItem(el, it) {
      if (it.brand) return;  // brand has no dynamic price/spark — clock ticks separately
      // Price + change text
      el.querySelector('.price').textContent = it.price;
      const changeEl = el.querySelector('.change');
      changeEl.className = 'change ' + it.direction;
      changeEl.textContent = it.change;

      // Sparkline: update geometry without touching CSS animation properties
      const svg = el.querySelector('.spark');
      svg.classList.remove('up', 'down');
      svg.classList.add(it.direction);
      const vb = svg.viewBox.baseVal;
      const W = vb.width  || 140;
      const H = vb.height || 80;
      const values = (it.spark && it.spark.length >= 2) ? it.spark : [1, 1];
      const points = sparklinePoints(values, W, H);
      const by = baselineY(values, H);
      const lp = lastPoint(values, W, H);
      svg.querySelector('.spark-line').setAttribute('points', points);
      const baseline = svg.querySelector('.spark-baseline');
      baseline.setAttribute('y1', by.toFixed(1));
      baseline.setAttribute('y2', by.toFixed(1));
      const dot  = svg.querySelector('.spark-dot');
      const ring = svg.querySelector('.spark-ring');
      const cx = lp.x.toFixed(1), cy = lp.y.toFixed(1);
      dot.setAttribute('cx',  cx); dot.setAttribute('cy',  cy);
      ring.setAttribute('cx', cx); ring.setAttribute('cy', cy);
    }

    function scheduleStaggeredRedraws(elements) {
      // Random order, ~200ms apart between items. Brand item has no .spark-line
      // so triggerRedraw is a no-op on it — filter it out so it doesn't burn a
      // stagger slot.
      const animatable = elements.filter(function (el) {
        return el && el.querySelector('.spark-line');
      });
      const order = animatable.map(function (_, i) { return i; });
      shuffleInPlace(order);
      animatable.forEach(function (el, idx) {
        setTimeout(function () { triggerRedraw(el); }, order[idx] * STAGGER_MS);
      });
    }

    let lastSymbolsKey = null;
    function renderItems(items) {
      const root = document.getElementById('items');
      const skey = symbolsKey(items);
      // First render or symbol set changed → rebuild + redraw every item.
      if (skey !== lastSymbolsKey) {
        Object.keys(itemRefs).forEach(function (k) { delete itemRefs[k]; });
        root.innerHTML = '';
        const fresh = [];
        items.forEach(function (it) {
          const el = buildItem(it);
          root.appendChild(el);
          itemRefs[it.symbol] = el;
          lastSpark[it.symbol] = (it.spark || []).join(',');
          fresh.push(el);
        });
        lastSymbolsKey = skey;
        scheduleStaggeredRedraws(fresh);
        return;
      }
      // In-place update. Only items whose spark array actually changed get a
      // fresh redraw animation — quiet items stay quiet.
      const changed = [];
      items.forEach(function (it) {
        const el = itemRefs[it.symbol];
        if (!el) return;
        const sparkKey = (it.spark || []).join(',');
        const sparkChanged = sparkKey !== lastSpark[it.symbol];
        updateItem(el, it);
        if (sparkChanged) {
          lastSpark[it.symbol] = sparkKey;
          changed.push(el);
        }
      });
      if (changed.length) scheduleStaggeredRedraws(changed);
    }

    function renderError(msg) {
      const root = document.getElementById('items');
      root.innerHTML = '<div class="empty">' + msg + '</div>';
    }

    async function load() {
      try {
        const cacheBust = '?t=' + Date.now();
        const [cryptoData, indicesData] = await Promise.all([
          fetch('crypto.json'  + cacheBust).then(function (r) { return r.json(); }),
          fetch('indices.json' + cacheBust).then(function (r) { return r.json(); }),
        ]);

        const cryptoItems = [];
        CRYPTO_ORDER.forEach(function (sym) {
          if (cryptoData && cryptoData[sym]) cryptoItems.push(cryptoItem(sym, cryptoData[sym]));
        });
        const indexItems = [];
        INDEX_ORDER.forEach(function (name) {
          if (indicesData && indicesData[name]) indexItems.push(indexItem(name, indicesData[name]));
        });

        const wall = buildWall(cryptoItems, indexItems);
        const myItems = panelSlice(wall);
        if (myItems.length === 0) {
          renderError('No data');
        } else {
          renderItems(myItems);
          // Brand may have just landed in the DOM — start/refresh its clock
          if (document.getElementById('greeting')) {
            updateClock();
            ensureClockTicker();
          }
        }
      } catch (e) {
        console.error(e);
        renderError('Fetch error: ' + e.message);
      }
    }

    // Make sure setInterval for the clock is wired exactly once, even though
    // the brand item is only inserted into the DOM after the first successful
    // fetch (its presence depends on this panel's slice of the wall).
    let _clockTickerStarted = false;
    function ensureClockTicker() {
      if (_clockTickerStarted) return;
      _clockTickerStarted = true;
      setInterval(updateClock, 60 * 1000);
    }

    load();
    // Refresh data every 2 minutes — same cadence as the crypto workflow
    setInterval(load, 120 * 1000);

    // ?reload=N  — periodic full-page reload (cache-busted). Off by default.
    // Bump any URL param value in the Colorlight config (e.g. add ?v=2) for a
    // one-shot manual hard refresh.
    if (window._RELOAD_MIN > 0) {
      setTimeout(function () {
        const url = new URL(location.href);
        url.searchParams.set('_', Date.now());
        location.href = url.toString();
      }, window._RELOAD_MIN * 60 * 1000);
    }
  </script>
</body>
</html>
