<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Force the browser to render at the LED panel's native resolution.
       If Colorlight's webview respects this, every CSS pixel = 1 LED pixel —
       no scaling step between browser output and panel, no sub-pixel smudge. -->
  <meta name="viewport" content="width=3840, height=86, initial-scale=1, user-scalable=no">
  <title>Office Ticker — Prices (Native resolution 3840×86)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 3840px;
      height: 86px;
      background: #010101;
      overflow: hidden;
    }
    canvas {
      display: block;
      /* Explicit pixel size — no responsive scaling */
      width: 3840px;
      height: 86px;
      image-rendering: pixelated;
    }
    /* Tiny debug overlay (top-left, transparent) to confirm what the webview
       actually reports for resolution. Comment out / remove for production. */
    #debug {
      position: fixed; top: 2px; left: 2px;
      font: 10px monospace;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="ticker" width="3840" height="86"></canvas>
  <div id="debug"></div>

  <script>
    (function () {
      const canvas = document.getElementById('ticker');
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;

      // Debug overlay — confirms whether the webview is honoring our meta viewport
      const dbg = document.getElementById('debug');
      function updateDebug() {
        dbg.textContent =
          'inner=' + window.innerWidth + '×' + window.innerHeight +
          ' dpr=' + (window.devicePixelRatio || 1).toFixed(2) +
          ' canvas=' + canvas.width + '×' + canvas.height;
      }

      const URL_PARAMS = new URLSearchParams(window.location.search);
      const SPEED_PX_PER_SEC = (function () {
        const v = parseInt(URL_PARAMS.get('speed'), 10);
        return (isFinite(v) && v > 0 && v <= 500) ? v : 30;
      })();
      const FPS_CAP = (function () {
        const v = parseInt(URL_PARAMS.get('fps'), 10);
        return (isFinite(v) && v > 0 && v <= 120) ? v : 0;
      })();
      const FRAME_MS = FPS_CAP > 0 ? (1000 / FPS_CAP) : 0;

      const COLORS = {
        bg: '#010101', text: '#ffffff',
        up: '#22c55e', down: '#ef4444',
      };

      const ITEMS = [
        { symbol: 'S&P 500', price: '7,554',    change: '-0.61%', direction: 'down' },
        { symbol: 'NASDAQ',  price: '30,571',   change: '+0.19%', direction: 'up'   },
        { symbol: 'TA-125',  price: '4,188',    change: '-0.90%', direction: 'down' },
        { symbol: 'BTC',     price: '$63,869',  change: '-4.93%', direction: 'down' },
        { symbol: 'ETH',     price: '$1,783',   change: '-4.98%', direction: 'down' },
        { symbol: 'BNB',     price: '$602.55',  change: '-6.27%', direction: 'down' },
        { symbol: 'XRP',     price: '$1.18',    change: '-5.49%', direction: 'down' },
        { symbol: 'SOL',     price: '$69.76',   change: '-7.30%', direction: 'down' },
      ];

      // Native-pixel layout for the 3840×86 panel.
      // Font is sized in absolute pixels — no vh/vw relative units, so layout is
      // identical whether the webview viewport matches or not.
      const PANEL_W = 3840;
      const PANEL_H = 86;
      const FONT_SIZE = 64;   // ~74% of panel height — generous but fits
      const INTRA_GAP = 28;   // px between symbol/price/change within an item
      const INTER_GAP = 70;   // px between items
      const LOGO_SIZE = 56;   // px

      function setFont(weight) {
        ctx.font = weight + ' ' + FONT_SIZE + 'px "Figtree", "Helvetica Neue", Arial, sans-serif';
      }
      function currentTime() {
        const d = new Date();
        return new Intl.DateTimeFormat('en-GB', {
          timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit', hour12: false
        }).format(d);
      }
      function priceItemWidth(it) {
        setFont('600');
        return Math.round(
          ctx.measureText(it.symbol).width + INTRA_GAP +
          ctx.measureText(it.price).width + INTRA_GAP +
          ctx.measureText(it.change).width + INTER_GAP
        );
      }
      function brandingWidth() {
        setFont('600');
        return Math.round(LOGO_SIZE + 24 + ctx.measureText(currentTime()).width + INTER_GAP);
      }

      function drawPriceItem(it, x, y) {
        let cursor = x;
        ctx.textBaseline = 'middle';
        setFont('600');
        ctx.fillStyle = COLORS.text;
        ctx.fillText(it.symbol, Math.round(cursor), y);
        cursor += ctx.measureText(it.symbol).width + INTRA_GAP;
        ctx.fillText(it.price, Math.round(cursor), y);
        cursor += ctx.measureText(it.price).width + INTRA_GAP;
        ctx.fillStyle = it.direction === 'up' ? COLORS.up : COLORS.down;
        ctx.fillText(it.change, Math.round(cursor), y);
      }
      function drawBranding(logo, x, y) {
        ctx.globalAlpha = 0.9;
        ctx.drawImage(logo, Math.round(x), Math.round(y - LOGO_SIZE / 2), LOGO_SIZE, LOGO_SIZE);
        ctx.globalAlpha = 1.0;
        setFont('600');
        ctx.fillStyle = COLORS.text;
        ctx.fillText(currentTime(), Math.round(x + LOGO_SIZE + 24), y);
      }

      // Offscreen buffer holds two copies of content (seamless loop)
      const buffer = document.createElement('canvas');
      const bctx = buffer.getContext('2d');
      bctx.imageSmoothingEnabled = false;

      let setWidth = 0;

      function buildBuffer(logo) {
        const widths = ITEMS.map(priceItemWidth);
        const brandW = brandingWidth();
        setWidth = widths.reduce(function (a, b) { return a + b; }, 0) + brandW;

        buffer.width = setWidth * 2;
        buffer.height = PANEL_H;
        bctx.imageSmoothingEnabled = false;

        // Build into the offscreen buffer using bctx (and a temp swap)
        const savedCtx = window._tmp_ctx || (window._tmp_ctx = ctx);
        // Switch helpers to use buffer ctx
        ctx_for = bctx;
        // Draw two copies
        ctx_for.fillStyle = COLORS.bg;
        ctx_for.fillRect(0, 0, buffer.width, buffer.height);
        const y = Math.round(PANEL_H / 2);
        let cursor = 0;
        for (let copy = 0; copy < 2; copy++) {
          for (let i = 0; i < ITEMS.length; i++) {
            drawPriceItemTo(ctx_for, ITEMS[i], cursor, y);
            cursor += widths[i];
          }
          drawBrandingTo(ctx_for, logo, cursor, y);
          cursor += brandW;
        }
      }

      // Helpers that take ctx explicitly so we can draw into buffer or visible canvas
      let ctx_for = ctx;
      function setFontFor(c, weight) {
        c.font = weight + ' ' + FONT_SIZE + 'px "Figtree", "Helvetica Neue", Arial, sans-serif';
      }
      function drawPriceItemTo(c, it, x, y) {
        let cursor = x;
        c.textBaseline = 'middle';
        setFontFor(c, '600');
        c.fillStyle = COLORS.text;
        c.fillText(it.symbol, Math.round(cursor), y);
        cursor += c.measureText(it.symbol).width + INTRA_GAP;
        c.fillText(it.price, Math.round(cursor), y);
        cursor += c.measureText(it.price).width + INTRA_GAP;
        c.fillStyle = it.direction === 'up' ? COLORS.up : COLORS.down;
        c.fillText(it.change, Math.round(cursor), y);
      }
      function drawBrandingTo(c, logo, x, y) {
        c.globalAlpha = 0.9;
        c.drawImage(logo, Math.round(x), Math.round(y - LOGO_SIZE / 2), LOGO_SIZE, LOGO_SIZE);
        c.globalAlpha = 1.0;
        setFontFor(c, '600');
        c.fillStyle = COLORS.text;
        c.fillText(currentTime(), Math.round(x + LOGO_SIZE + 24), y);
      }

      let position = 0;
      let lastTimeMs = 0;
      let lastFrameMs = 0;

      function tick(now) {
        if (FPS_CAP > 0 && (now - lastFrameMs) < FRAME_MS) {
          requestAnimationFrame(tick);
          return;
        }
        lastFrameMs = now;
        if (lastTimeMs === 0) lastTimeMs = now;
        const dt = (now - lastTimeMs) / 1000;
        lastTimeMs = now;

        position = position + SPEED_PX_PER_SEC * dt;
        if (position >= setWidth) position -= setWidth;
        const intPos = Math.floor(position);

        // Blit window of buffer to visible canvas — same source and dest size
        ctx.drawImage(
          buffer,
          intPos, 0, PANEL_W, PANEL_H,
          0, 0, PANEL_W, PANEL_H
        );

        updateDebug();
        requestAnimationFrame(tick);
      }

      const logo = new Image();
      logo.onload = function () {
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            setTimeout(function () { buildBuffer(logo); requestAnimationFrame(tick); }, 100);
          });
        } else {
          setTimeout(function () { buildBuffer(logo); requestAnimationFrame(tick); }, 800);
        }
      };
      logo.onerror = function () {
        const blank = new Image();
        setTimeout(function () { buildBuffer(blank); requestAnimationFrame(tick); }, 500);
      };
      logo.src = 'logo.svg';

      setInterval(function () { buildBuffer(logo); }, 60 * 1000);
    })();
  </script>
</body>
</html>
