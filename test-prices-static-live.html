<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=3840, height=86, initial-scale=1, user-scalable=no">
  <title>Office Ticker — Prices (Static + Live + Flash)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #010101;
      --text: #fff;
      --up: #22c55e;
      --down: #ef4444;
      --flash-duration: 800ms;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 3840px;
      height: 86px;
      background: var(--bg);
      color: var(--text);
      font-family: "Figtree", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      font-weight: 600;
      overflow: hidden;
    }
    .ticker {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 12px;
      /* 32px font matches the canvas-branded version at 86px panel height */
      font-size: 32px;
    }
    /* Branding corner: logo + time */
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;          /* matches branded: fontSize * 0.5 */
      margin-right: 24px;
      padding-right: 24px;
      border-right: 1px solid rgba(255,255,255,0.18);
      flex-shrink: 0;
    }
    .brand img {
      height: 28px;       /* matches branded: fontSize * 0.85 */
      width: 28px;
      opacity: 0.9;
    }
    .brand .time {
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    /* Items list — distributed evenly across remaining horizontal space */
    .items {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: 100%;
    }
    .item {
      display: inline-flex;
      align-items: baseline;
      gap: 16px;          /* matches branded: fontSize * 0.5 — between symbol/price/change */
      padding: 6px 14px;
      border-radius: 6px;
      white-space: nowrap;
      transition: background-color 200ms ease-out;
    }
    .symbol { color: var(--text); font-weight: 600; }
    .price  { color: var(--text); font-weight: 600; }
    .change { font-weight: 600; }
    .change.up   { color: var(--up); }
    .change.down { color: var(--down); }

    /* Flash animations triggered when price updates */
    .item.flash-up   { animation: flash-up   var(--flash-duration) ease-out; }
    .item.flash-down { animation: flash-down var(--flash-duration) ease-out; }
    @keyframes flash-up {
      0%   { background-color: rgba(34, 197, 94, 0.55); }
      100% { background-color: transparent; }
    }
    @keyframes flash-down {
      0%   { background-color: rgba(239, 68, 68, 0.55); }
      100% { background-color: transparent; }
    }
  </style>
</head>
<body>
  <div class="ticker">
    <div class="brand">
      <img src="logo.svg" alt="Fireblocks" />
      <span class="time" id="time">--:--</span>
    </div>
    <div class="items" id="items">
      <!-- Items rendered by JS -->
    </div>
  </div>

  <script>
    // ----- Configuration -----
    // CoinGecko IDs → display symbols (order = display order)
    const COINS = [
      { id: 'bitcoin',      symbol: 'BTC'  },
      { id: 'ethereum',     symbol: 'ETH'  },
      { id: 'binancecoin',  symbol: 'BNB'  },
      { id: 'ripple',       symbol: 'XRP'  },
      { id: 'solana',       symbol: 'SOL'  },
    ];
    let pollIntervalMs = 10 * 1000;      // 10s default. Backoff doubles this on 429 rate-limit.
    const POLL_MAX_MS = 60 * 1000;       // ceiling for backoff
    const CG_URL =
      'https://api.coingecko.com/api/v3/simple/price'
      + '?ids=' + COINS.map(function (c) { return c.id; }).join(',')
      + '&vs_currencies=usd'
      + '&include_24hr_change=true';

    // ----- DOM setup -----
    const itemsRoot = document.getElementById('items');
    const itemNodes = {};
    COINS.forEach(function (c) {
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.symbol = c.symbol;
      el.dataset.coinId = c.id;
      el.innerHTML =
        '<span class="symbol">' + c.symbol + '</span>' +
        '<span class="price">—</span>' +
        '<span class="change">—</span>';
      itemsRoot.appendChild(el);
      itemNodes[c.id] = el;
    });

    // ----- Formatting helpers -----
    function fmtPrice(p) {
      if (p >= 1000) return '$' + Math.round(p).toLocaleString('en-US');
      return '$' + p.toFixed(2);
    }
    function fmtChange(c) {
      const sign = c >= 0 ? '+' : '';
      return sign + c.toFixed(2) + '%';
    }

    // ----- Flash animation trigger -----
    function flashItem(el, direction) {
      // Remove any in-flight animation class, force reflow, then re-add to restart
      el.classList.remove('flash-up', 'flash-down');
      // eslint-disable-next-line no-unused-expressions
      void el.offsetWidth;
      el.classList.add(direction === 'up' ? 'flash-up' : 'flash-down');
    }

    // ----- Price fetch & update -----
    let pollTimer = null;
    function schedulePoll() {
      if (pollTimer) clearTimeout(pollTimer);
      pollTimer = setTimeout(fetchAndUpdate, pollIntervalMs);
    }
    async function fetchAndUpdate() {
      try {
        const res = await fetch(CG_URL);
        if (res.status === 429) {
          // Rate-limited — back off (double the interval up to the ceiling)
          pollIntervalMs = Math.min(pollIntervalMs * 2, POLL_MAX_MS);
          console.warn('Rate-limited; backing off to', pollIntervalMs, 'ms');
          schedulePoll();
          return;
        }
        if (!res.ok) { schedulePoll(); return; }
        // Successful response — reset interval back to 10s if it had backed off
        pollIntervalMs = 10 * 1000;
        const data = await res.json();
        COINS.forEach(function (c) {
          const d = data[c.id];
          if (!d) return;
          const el = itemNodes[c.id];
          const newPrice = d.usd;
          const newChange = d.usd_24h_change || 0;

          // Compare with previous price for flash trigger
          const prevPrice = parseFloat(el.dataset.price);
          if (isFinite(prevPrice)) {
            if (newPrice > prevPrice)      flashItem(el, 'up');
            else if (newPrice < prevPrice) flashItem(el, 'down');
          }

          // Update displayed values
          el.querySelector('.price').textContent = fmtPrice(newPrice);
          const changeEl = el.querySelector('.change');
          changeEl.textContent = fmtChange(newChange);
          changeEl.className = 'change ' + (newChange >= 0 ? 'up' : 'down');

          // Store for next comparison
          el.dataset.price = newPrice;
        });
      } catch (e) {
        console.error('Fetch failed:', e);
      } finally {
        schedulePoll();
      }
    }

    // ----- Time updater -----
    function updateTime() {
      const d = new Date();
      const t = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit', hour12: false
      }).format(d);
      document.getElementById('time').textContent = t;
    }

    // ----- Boot -----
    updateTime();
    setInterval(updateTime, 30 * 1000);
    fetchAndUpdate();  // initial fetch; subsequent ones scheduled by schedulePoll() in finally
  </script>
</body>
</html>
