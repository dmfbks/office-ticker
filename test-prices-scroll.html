<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Ticker — Prices (Scroll Test)</title>

  <!-- Figtree from Google Fonts. If Colorlight player can't reach googleapis,
       we'll self-host the .woff2 files in /fonts/ — easy swap. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --scroll-duration: 125s;    /* time to scroll one full set off-screen */
      --color-bg: #000;
      --color-text: #fff;
      --color-up: #22c55e;        /* bright LED-friendly green */
      --color-down: #ef4444;      /* bright LED-friendly red */
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeSpeed;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }
    .ticker-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .ticker-track {
      display: inline-flex;
      flex-shrink: 0;
      align-items: baseline;
      animation: scroll-left var(--scroll-duration) linear infinite;
      font-size: clamp(28px, 9vh, 96px);
      letter-spacing: 0.01em;
      will-change: transform;
    }
    .item {
      display: inline-flex;
      align-items: baseline;
      padding: 0 2em;
      white-space: nowrap;
    }
    /* Per-element margin instead of `gap` — Colorlight's webview is older Chromium
       and doesn't honor `gap` on inline-flex. margin-right works everywhere. */
    .symbol { color: var(--color-text); font-weight: 800; margin-right: 0.9em; }
    .price  { color: var(--color-text); font-weight: 500; margin-right: 0.6em; }
    /* Apple-Stocks-style filled chip for % change */
    .change {
      font-weight: 700;
      color: #fff;
      padding: 0.18em 0.6em;
      border-radius: 0.22em;
      display: inline-block;
      line-height: 1;
    }
    .change.up   { background: var(--color-up); }
    .change.down { background: var(--color-down); }

    @keyframes scroll-left {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(-50%, 0, 0); }
    }
  </style>
</head>
<body>
  <div class="ticker-wrap">
    <!-- Items are duplicated below: the second set lets the animation loop
         seamlessly. After scrolling 50% of the track width (= one full set),
         the visible content at position -50% matches position 0, so the
         snap-back is invisible. -->
    <div class="ticker-track">
      <div class="item"><span class="symbol">S&P 500</span><span class="price">7,600</span><span class="change up">+0.48%</span></div>
      <div class="item"><span class="symbol">NASDAQ</span><span class="price">30,514</span><span class="change up">+0.96%</span></div>
      <div class="item"><span class="symbol">TA-125</span><span class="price">4,242</span><span class="change up">+0.07%</span></div>
      <div class="item"><span class="symbol">BTC</span><span class="price">$72,655</span><span class="change down">-1.43%</span></div>
      <div class="item"><span class="symbol">ETH</span><span class="price">$1,983</span><span class="change down">-1.59%</span></div>
      <div class="item"><span class="symbol">BNB</span><span class="price">$698.44</span><span class="change down">-2.95%</span></div>
      <div class="item"><span class="symbol">XRP</span><span class="price">$1.30</span><span class="change down">-2.31%</span></div>
      <div class="item"><span class="symbol">SOL</span><span class="price">$80.97</span><span class="change down">-1.78%</span></div>
      <div class="item"><span class="symbol">S&P 500</span><span class="price">7,600</span><span class="change up">+0.48%</span></div>
      <div class="item"><span class="symbol">NASDAQ</span><span class="price">30,514</span><span class="change up">+0.96%</span></div>
      <div class="item"><span class="symbol">TA-125</span><span class="price">4,242</span><span class="change up">+0.07%</span></div>
      <div class="item"><span class="symbol">BTC</span><span class="price">$72,655</span><span class="change down">-1.43%</span></div>
      <div class="item"><span class="symbol">ETH</span><span class="price">$1,983</span><span class="change down">-1.59%</span></div>
      <div class="item"><span class="symbol">BNB</span><span class="price">$698.44</span><span class="change down">-2.95%</span></div>
      <div class="item"><span class="symbol">XRP</span><span class="price">$1.30</span><span class="change down">-2.31%</span></div>
      <div class="item"><span class="symbol">SOL</span><span class="price">$80.97</span><span class="change down">-1.78%</span></div>
    </div>
  </div>
</body>
</html>
