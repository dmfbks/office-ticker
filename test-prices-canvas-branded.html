<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Ticker — Prices (Canvas, branded)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #010101;
      overflow: hidden;
    }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="ticker"></canvas>

  <script>
    // Canvas-rendered ticker with branding panel.
    // Branding panel = once-per-loop section containing:
    //   [Logo]  WELCOME TO FIREBLOCKS  •  Daily greeting  •  Current time
    // The greeting comes from a holiday lookup or falls back to "Happy <Weekday>!"
    // Time is read fresh on every frame, so it's always live without page refresh.
    (function () {
      const canvas = document.getElementById('ticker');
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;

      const COLORS = {
        bg:   '#010101',
        text: '#ffffff',
        up:   '#22c55e',
        down: '#ef4444',
        dim:  'rgba(255,255,255,0.7)',  // for the bullet separators in branding
      };

      const ITEMS = [
        { symbol: "S&P 500", price: "7,406", change: "-2.35%", direction: "down" },
        { symbol: "NASDAQ", price: "29,414", change: "-3.27%", direction: "down" },
        { symbol: "TA-125", price: "4,232", change: "+0.01%", direction: "up" },
        { symbol: "BTC", price: "$63,103", change: "+0.91%", direction: "up" },
        { symbol: "ETH", price: "$1,681", change: "+1.70%", direction: "up" },
        { symbol: "BNB", price: "$601.04", change: "+1.16%", direction: "up" },
        { symbol: "XRP", price: "$1.16", change: "+2.33%", direction: "up" },
        { symbol: "SOL", price: "$66.91", change: "+2.40%", direction: "up" },
      ];
      const BRANDING = { kind: 'branding' };

      // ===== Holiday calendar (2026; hardcoded — confirm Hebrew dates per your local source) =====
      const HOLIDAYS = {
        '01-01': 'Happy New Year!',
        '02-14': 'Happy Valentine\'s Day',
        '03-08': 'International Women\'s Day',
        '04-23': 'Yom HaAtzmaut Sameach',
        '09-12': 'Shanah Tovah',
        '09-21': 'Tzom Kal',
        '10-31': 'Happy Halloween',
        '12-25': 'Merry Christmas',
        '12-31': 'Happy New Year\'s Eve',
      };
      // Date ranges (start—end inclusive) where every day matches the same greeting
      const HOLIDAY_RANGES = [
        { start: '06-01', end: '06-07', greeting: 'Happy Pride Month' },
        { start: '12-04', end: '12-12', greeting: 'Chag Hanukkah Sameach' },
      ];
      // (Month-wide observances removed — Pride moved into HOLIDAY_RANGES as first week of June)
      const HOLIDAY_MONTHS = {};

      function pad2(n) { return n < 10 ? '0' + n : String(n); }

      function todayGreeting() {
        const d = new Date();
        const m = pad2(d.getMonth() + 1);
        const day = pad2(d.getDate());
        const key = m + '-' + day;
        if (HOLIDAYS[key]) return HOLIDAYS[key];
        for (const r of HOLIDAY_RANGES) {
          if (key >= r.start && key <= r.end) return r.greeting;
        }
        if (HOLIDAY_MONTHS[m]) return HOLIDAY_MONTHS[m];
        const wd = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
        return 'Happy ' + wd + '!';
      }

      function currentTime() {
        // Format HH:MM in Israel time (24h)
        const d = new Date();
        const tz = new Intl.DateTimeFormat('en-GB', {
          timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit', hour12: false
        }).format(d);
        return tz;
      }

      // Speed configurable via URL: ?speed=NN (px/sec). Default 30.
      // FPS cap: ?fps=NN. Default 0 = uncapped (= 60 default via rAF).
      const URL_PARAMS = new URLSearchParams(window.location.search);
      const SPEED_PX_PER_SEC = (function () {
        const v = parseInt(URL_PARAMS.get('speed'), 10);
        return (isFinite(v) && v > 0 && v <= 500) ? v : 30;
      })();
      const FPS_CAP = (function () {
        const v = parseInt(URL_PARAMS.get('fps'), 10);
        return (isFinite(v) && v > 0 && v <= 120) ? v : 0;
      })();
      const FRAME_MS = FPS_CAP > 0 ? (1000 / FPS_CAP) : 0;
      let lastFrameTime = 0;

      // ===== Live CoinGecko fetch for crypto items =====
      // Indices remain hardcoded (waiting on Twelve Data API key);
      // crypto prices update every 30 seconds from the public CoinGecko API.
      const COIN_IDS = {
        'BTC': 'bitcoin',
        'ETH': 'ethereum',
        'BNB': 'binancecoin',
        'XRP': 'ripple',
        'SOL': 'solana',
      };
      const CG_URL =
        'https://api.coingecko.com/api/v3/simple/price'
        + '?ids=' + Object.values(COIN_IDS).join(',')
        + '&vs_currencies=usd&include_24hr_change=true';
      function fmtPrice(p) {
        if (p >= 1000) return '$' + Math.round(p).toLocaleString('en-US');
        return '$' + p.toFixed(2);
      }
      function fmtChange(c) {
        const sign = c >= 0 ? '+' : '';
        return sign + c.toFixed(2) + '%';
      }
      let pollMs = 30 * 1000;
      const POLL_MAX_MS = 120 * 1000;
      async function fetchPrices() {
        try {
          const res = await fetch(CG_URL);
          if (res.status === 429) {
            pollMs = Math.min(pollMs * 2, POLL_MAX_MS);
            return;
          }
          if (!res.ok) return;
          pollMs = 30 * 1000;
          const data = await res.json();
          ITEMS.forEach(function (item) {
            const id = COIN_IDS[item.symbol];
            if (!id) return;  // skip indices
            const d = data[id];
            if (!d) return;
            item.price = fmtPrice(d.usd);
            const ch = d.usd_24h_change || 0;
            item.change = fmtChange(ch);
            item.direction = ch >= 0 ? 'up' : 'down';
          });
        } catch (e) { /* swallow */ }
        finally { setTimeout(fetchPrices, pollMs); }
      }
      // Kick off initial fetch (subsequent calls scheduled in finally)
      fetchPrices();

      // ===== Live Twelve Data fetch for stock indices =====
      // Requires ?tdkey=YOUR_API_KEY on the URL. If missing, indices stay hardcoded.
      const TD_KEY = URL_PARAMS.get('tdkey') || '';
      // Twelve Data symbol mapping
      const TD_SYMBOLS = {
        'S&P 500': 'SPX',
        'NASDAQ':  'NDX',
        'TA-35':   'TA35',    // Twelve Data has TA-35 (not TA-125) on free tier
      };
      function fmtIndexPrice(p) {
        return Math.round(p).toLocaleString('en-US');
      }
      let tdPollMs = 5 * 60 * 1000;          // 5 min (indices don't tick fast)
      const TD_POLL_MAX_MS = 30 * 60 * 1000; // 30 min ceiling on backoff
      async function fetchIndices() {
        if (!TD_KEY) return;  // disabled if no key
        try {
          const syms = Object.values(TD_SYMBOLS).join(',');
          const url = 'https://api.twelvedata.com/quote'
            + '?symbol=' + encodeURIComponent(syms)
            + '&apikey=' + encodeURIComponent(TD_KEY);
          const res = await fetch(url);
          if (res.status === 429 || res.status === 401) {
            // Rate-limited or invalid key — back off
            tdPollMs = Math.min(tdPollMs * 2, TD_POLL_MAX_MS);
            return;
          }
          if (!res.ok) return;
          tdPollMs = 5 * 60 * 1000;
          const data = await res.json();
          // Multi-symbol response: { 'SPX': {...}, 'NDX': {...}, 'TA125': {...} }
          // Single-symbol response: direct fields
          ITEMS.forEach(function (item) {
            const tdSym = TD_SYMBOLS[item.symbol];
            if (!tdSym) return;
            const d = data[tdSym] || (data.symbol === tdSym ? data : null);
            if (!d || d.status === 'error') return;
            let close = parseFloat(d.close);
            let prev  = parseFloat(d.previous_close);
            if (!isFinite(close) || !isFinite(prev) || prev === 0) return;
            // TA-35 sanity: if reported in agorot (ILA) the value is ~200,000.
            // Real TA-35 in shekels is ~2,000. Divide by 100 if we detect agorot.
            if (item.symbol === 'TA-35' && close > 50000) {
              close = close / 100;
              prev  = prev  / 100;
            }
            // Compute % ourselves — Twelve Data's percent_change can be off.
            const pct = ((close - prev) / prev) * 100;
            item.price = fmtIndexPrice(close);
            item.change = fmtChange(pct);
            item.direction = pct >= 0 ? 'up' : 'down';
          });
        } catch (e) { /* swallow */ }
        finally { setTimeout(fetchIndices, tdPollMs); }
      }
      fetchIndices();


      // Sizing
      let fontSize = 0, badgeRadius = 0, intraItemGap = 0, interItemGap = 0;
      let brandingBulletGap = 0;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        fontSize = Math.round(Math.max(32, Math.min(104, canvas.height * 0.10)));
        intraItemGap = Math.round(fontSize * 0.5);
        interItemGap = Math.round(fontSize * 1.4);
        brandingBulletGap = Math.round(fontSize * 0.6);
      }

      function setFont(weight) {
        ctx.font = weight + ' ' + fontSize + 'px "Figtree", "Helvetica Neue", Arial, sans-serif';
      }

      const logo = new Image();
      let logoReady = false;
      logo.onload = function () { logoReady = true; };
      logo.src = 'logo.svg';

      // Width of one price item
      function priceItemWidth(it) {
        setFont('600'); const wSym = ctx.measureText(it.symbol).width;
        setFont('600'); const wPri = ctx.measureText(it.price).width;
        setFont('600'); const wCh  = ctx.measureText(it.change).width;
        return Math.round(wSym + intraItemGap + wPri + intraItemGap + wCh + interItemGap);
      }

      // Width of the branding panel — uses CURRENT greeting + time (so panel width
      // accommodates whatever the longest displayed string is for today)
      function brandingWidth() {
        const logoSize = Math.round(fontSize * 0.85);
        const sections = [currentTime()];
        setFont('600');
        let textWidth = 0;
        sections.forEach(function (s, idx) {
          textWidth += ctx.measureText(s).width;
          if (idx < sections.length - 1) {
            // bullet • plus gaps
            textWidth += brandingBulletGap;
            textWidth += ctx.measureText('•').width;
            textWidth += brandingBulletGap;
          }
        });
        const logoPad = Math.round(fontSize * 0.5);
        return Math.round(logoSize + logoPad + textWidth + interItemGap);
      }

      function drawPriceItem(it, x, y) {
        let cursor = x;
        ctx.textBaseline = 'middle';
        setFont('600');
        ctx.fillStyle = COLORS.text;
        ctx.fillText(it.symbol, Math.round(cursor), y);
        cursor += ctx.measureText(it.symbol).width + intraItemGap;

        setFont('600');
        ctx.fillStyle = COLORS.text;
        ctx.fillText(it.price, Math.round(cursor), y);
        cursor += ctx.measureText(it.price).width + intraItemGap;

        setFont('600');
        ctx.fillStyle = it.direction === 'up' ? COLORS.up : COLORS.down;
        ctx.fillText(it.change, Math.round(cursor), y);
      }

      function drawBranding(x, y) {
        let cursor = x;
        const logoSize = Math.round(fontSize * 0.85);
        const logoPad = Math.round(fontSize * 0.5);

        // Logo
        if (logoReady) {
          ctx.globalAlpha = 0.9;
          ctx.drawImage(logo, Math.round(cursor), Math.round(y - logoSize / 2), logoSize, logoSize);
          ctx.globalAlpha = 1.0;
        }
        cursor += logoSize + logoPad;

        // Three text sections separated by bullets
        ctx.textBaseline = 'middle';
        setFont('600');
        const sections = [currentTime()];
        sections.forEach(function (s, idx) {
          ctx.fillStyle = COLORS.text;
          ctx.fillText(s, Math.round(cursor), y);
          cursor += ctx.measureText(s).width;
          if (idx < sections.length - 1) {
            cursor += brandingBulletGap;
            ctx.fillStyle = COLORS.dim;
            ctx.fillText('•', Math.round(cursor), y);
            cursor += ctx.measureText('•').width + brandingBulletGap;
          }
        });
      }

      // Pre-compute widths (branding width depends on current greeting/time but
      // is recomputed each draw — text widths can change as time ticks)
      function priceWidths() {
        return ITEMS.map(priceItemWidth);
      }

      let startTime = null;

      function draw(now) {
        if (FPS_CAP > 0 && (now - lastFrameTime) < FRAME_MS) {
          requestAnimationFrame(draw);
          return;
        }
        lastFrameTime = now;
        if (startTime === null) startTime = now;
        const elapsed = (now - startTime) / 1000;

        // Compute widths fresh each frame so time/greeting changes don't desync layout
        setFont('600');
        const itemW = priceWidths();
        const brandW = brandingWidth();
        const totalWidth = itemW.reduce(function (a, b) { return a + b; }, 0) + brandW;

        const _t = Math.round((elapsed * SPEED_PX_PER_SEC) % totalWidth);
        const scrollOffset = _t - totalWidth;  // right-scroll: starts off-screen left, slides right

        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const y = Math.round(canvas.height / 2);

        // Draw two copies of the sequence for seamless loop
        let cursor = scrollOffset;
        for (let copy = 0; copy < 2; copy++) {
          for (let i = 0; i < ITEMS.length; i++) {
            if (cursor < canvas.width && cursor + itemW[i] > 0) {
              drawPriceItem(ITEMS[i], cursor, y);
            }
            cursor += itemW[i];
          }
          // Branding panel
          if (cursor < canvas.width && cursor + brandW > 0) {
            drawBranding(cursor, y);
          }
          cursor += brandW;
        }

        requestAnimationFrame(draw);
      }

      function init() {
        resize();
        requestAnimationFrame(draw);
      }

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function () { setTimeout(init, 100); });
      } else {
        setTimeout(init, 800);
      }
      window.addEventListener('resize', resize);
    })();
  </script>
</body>
</html>
