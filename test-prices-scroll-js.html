<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Ticker — Prices (JS pixel-aligned scroll)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-bg: #010101;
      --color-text: #fff;
      --color-up: #22c55e;
      --color-down: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      /* MORE AGGRESSIVE: 'none' kills all smoothing for crisp LED pixels */
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeSpeed;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }
    .ticker-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .ticker-track {
      display: inline-flex;
      flex-shrink: 0;
      align-items: baseline;
      font-size: clamp(32px, 10vh, 104px);
      letter-spacing: 0.01em;
      /* NO CSS animation. Position controlled by JS for integer pixels. */
    }
    .item {
      display: inline-flex;
      align-items: baseline;
      padding: 0 2em;
      white-space: nowrap;
    }
    .symbol { color: var(--color-text); font-weight: 800; margin-right: 0.9em; }
    .price  { color: var(--color-text); font-weight: 500; margin-right: 0.6em; }
    .change { font-weight: 700; }
    .change.up   { color: var(--color-up); }
    .change.down { color: var(--color-down); }
    .separator {
      padding: 0 2em;
      display: inline-flex;
      align-items: center;
      opacity: 0.85;
    }
    .separator img { height: 0.85em; width: auto; display: block; }
  </style>
</head>
<body>
  <div class="ticker-wrap">
    <div class="ticker-track" id="track">
      <div class="item"><span class="symbol">S&amp;P 500</span><span class="price">7,554</span><span class="change down">-0.61%</span></div>
      <div class="item"><span class="symbol">NASDAQ</span><span class="price">30,571</span><span class="change up">+0.19%</span></div>
      <div class="item"><span class="symbol">TA-125</span><span class="price">4,188</span><span class="change down">-0.90%</span></div>
      <div class="item"><span class="symbol">BTC</span><span class="price">$63,869</span><span class="change down">-4.93%</span></div>
      <div class="item"><span class="symbol">ETH</span><span class="price">$1,783</span><span class="change down">-4.98%</span></div>
      <div class="item"><span class="symbol">BNB</span><span class="price">$602.55</span><span class="change down">-6.27%</span></div>
      <div class="item"><span class="symbol">XRP</span><span class="price">$1.18</span><span class="change down">-5.49%</span></div>
      <div class="item"><span class="symbol">SOL</span><span class="price">$69.76</span><span class="change down">-7.30%</span></div>
      <div class="item separator"><img src="logo.svg" alt="Fireblocks"></div>
      <div class="item"><span class="symbol">S&amp;P 500</span><span class="price">7,554</span><span class="change down">-0.61%</span></div>
      <div class="item"><span class="symbol">NASDAQ</span><span class="price">30,571</span><span class="change up">+0.19%</span></div>
      <div class="item"><span class="symbol">TA-125</span><span class="price">4,188</span><span class="change down">-0.90%</span></div>
      <div class="item"><span class="symbol">BTC</span><span class="price">$63,869</span><span class="change down">-4.93%</span></div>
      <div class="item"><span class="symbol">ETH</span><span class="price">$1,783</span><span class="change down">-4.98%</span></div>
      <div class="item"><span class="symbol">BNB</span><span class="price">$602.55</span><span class="change down">-6.27%</span></div>
      <div class="item"><span class="symbol">XRP</span><span class="price">$1.18</span><span class="change down">-5.49%</span></div>
      <div class="item"><span class="symbol">SOL</span><span class="price">$69.76</span><span class="change down">-7.30%</span></div>
      <div class="item separator"><img src="logo.svg" alt="Fireblocks"></div>
    </div>
  </div>

  <script>
    // JS-driven pixel-aligned animation.
    // CSS keyframes were producing fractional-pixel translations mid-frame, which
    // the LED panel can't render and shows as smudge. Here, each frame computes
    // the new position from elapsed time, rounds to an integer pixel, and applies
    // it as translateX. This guarantees the track is always at a whole-pixel
    // offset — the LED panel can render each frame crisply.
    (function () {
      const track = document.getElementById('track');
      const SPEED_PX_PER_SEC = 30;  // tune for desired scroll speed

      let halfWidth = 0;
      let startTime = null;

      function measure() {
        // Track is duplicated — half its scrollWidth is one set's width.
        halfWidth = track.scrollWidth / 2;
      }

      function tick(now) {
        if (startTime === null) startTime = now;
        const elapsed = (now - startTime) / 1000;
        // Right-scroll: starts at -halfWidth (items off-screen left), grows to 0.
        const phase = (elapsed * SPEED_PX_PER_SEC) % halfWidth;
        const x = Math.round(-halfWidth + phase);
        track.style.transform = 'translateX(' + x + 'px)';
        requestAnimationFrame(tick);
      }

      // Wait for fonts and images so width measurement is accurate.
      window.addEventListener('load', function () {
        // Small delay to let webfont render
        setTimeout(function () {
          measure();
          requestAnimationFrame(tick);
        }, 200);
      });
      window.addEventListener('resize', measure);
    })();
  </script>
</body>
</html>
