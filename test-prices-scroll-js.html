<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Ticker — Prices (JS pixel-aligned scroll)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-bg: #010101;
      --color-text: #fff;
      --color-up: #22c55e;
      --color-down: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      /* MORE AGGRESSIVE: 'none' kills all smoothing for crisp LED pixels */
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeSpeed;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }
    .ticker-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .ticker-track {
      display: inline-flex;
      flex-shrink: 0;
      align-items: baseline;
      font-size: clamp(28px, 9vh, 96px);
      letter-spacing: 0.01em;
      /* NO CSS animation. Position controlled by JS for integer pixels. */
    }
    .item {
      display: inline-flex;
      align-items: baseline;
      padding: 0 2em;
      white-space: nowrap;
    }
    .symbol { color: var(--color-text); font-weight: 900; margin-right: 0.9em; }
    .price  { color: var(--color-text); font-weight: 600; margin-right: 0.6em; }
    .change {
      font-weight: 800;
      color: #fff;
      padding: 0.18em 0.6em;
      border-radius: 0.22em;
      display: inline-block;
      line-height: 1;
    }
    .change.up   { background: var(--color-up); }
    .change.down { background: var(--color-down); }
    .separator {
      padding: 0 2em;
      display: inline-flex;
      align-items: center;
      opacity: 0.85;
    }
    .separator img { height: 0.85em; width: auto; display: block; }
  </style>
</head>
<body>
  <div class="ticker-wrap">
    <div class="ticker-track" id="track">
      <div class="item"><span class="symbol">S&amp;P 500</span><span class="price">7,600</span><span class="change up">+0.48%</span></div>
      <div class="item"><span class="symbol">NASDAQ</span><span class="price">30,514</span><span class="change up">+0.96%</span></div>
      <div class="item"><span class="symbol">TA-125</span><span class="price">4,204</span><span class="change down">-0.84%</span></div>
      <div class="item"><span class="symbol">BTC</span><span class="price">$69,510</span><span class="change down">-4.32%</span></div>
      <div class="item"><span class="symbol">ETH</span><span class="price">$1,980</span><span class="change down">-0.13%</span></div>
      <div class="item"><span class="symbol">BNB</span><span class="price">$678.62</span><span class="change down">-3.62%</span></div>
      <div class="item"><span class="symbol">XRP</span><span class="price">$1.26</span><span class="change down">-3.09%</span></div>
      <div class="item"><span class="symbol">SOL</span><span class="price">$79.27</span><span class="change down">-2.15%</span></div>
      <div class="item separator"><img src="logo.svg" alt="Fireblocks"></div>
      <!-- Duplicate set for seamless loop -->
      <div class="item"><span class="symbol">S&amp;P 500</span><span class="price">7,600</span><span class="change up">+0.48%</span></div>
      <div class="item"><span class="symbol">NASDAQ</span><span class="price">30,514</span><span class="change up">+0.96%</span></div>
      <div class="item"><span class="symbol">TA-125</span><span class="price">4,204</span><span class="change down">-0.84%</span></div>
      <div class="item"><span class="symbol">BTC</span><span class="price">$69,510</span><span class="change down">-4.32%</span></div>
      <div class="item"><span class="symbol">ETH</span><span class="price">$1,980</span><span class="change down">-0.13%</span></div>
      <div class="item"><span class="symbol">BNB</span><span class="price">$678.62</span><span class="change down">-3.62%</span></div>
      <div class="item"><span class="symbol">XRP</span><span class="price">$1.26</span><span class="change down">-3.09%</span></div>
      <div class="item"><span class="symbol">SOL</span><span class="price">$79.27</span><span class="change down">-2.15%</span></div>
      <div class="item separator"><img src="logo.svg" alt="Fireblocks"></div>
    </div>
  </div>

  <script>
    // JS-driven pixel-aligned animation.
    // CSS keyframes were producing fractional-pixel translations mid-frame, which
    // the LED panel can't render and shows as smudge. Here, each frame computes
    // the new position from elapsed time, rounds to an integer pixel, and applies
    // it as translateX. This guarantees the track is always at a whole-pixel
    // offset — the LED panel can render each frame crisply.
    (function () {
      const track = document.getElementById('track');
      const SPEED_PX_PER_SEC = 30;  // tune for desired scroll speed

      let halfWidth = 0;
      let startTime = null;

      function measure() {
        // Track is duplicated — half its scrollWidth is one set's width.
        halfWidth = track.scrollWidth / 2;
      }

      function tick(now) {
        if (startTime === null) startTime = now;
        const elapsed = (now - startTime) / 1000;
        // Continuous offset, then modulo by halfWidth (one set) for seamless loop.
        const rawX = -((elapsed * SPEED_PX_PER_SEC) % halfWidth);
        // Round to whole pixel — this is the key step for LED crispness.
        const x = Math.round(rawX);
        track.style.transform = 'translateX(' + x + 'px)';
        requestAnimationFrame(tick);
      }

      // Wait for fonts and images so width measurement is accurate.
      window.addEventListener('load', function () {
        // Small delay to let webfont render
        setTimeout(function () {
          measure();
          requestAnimationFrame(tick);
        }, 200);
      });
      window.addEventListener('resize', measure);
    })();
  </script>
</body>
</html>
