<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Ticker — Prices (Canvas)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #010101;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="ticker"></canvas>

  <script>
    // Canvas-rendered ticker. Direct pixel-level control: each frame, clear the
    // canvas and re-draw all items at their current positions, all coordinates
    // rounded to integer pixels. No CSS sub-pixel rendering, no transform
    // interpolation, no webview animation pipeline — just direct pixel ops.
    (function () {
      const canvas = document.getElementById('ticker');
      const ctx = canvas.getContext('2d');

      // Bypass image smoothing — we want crisp pixels, not interpolated ones.
      ctx.imageSmoothingEnabled = false;

      const COLORS = {
        bg:     '#010101',
        text:   '#ffffff',
        up:     '#22c55e',
        down:   '#ef4444',
      };

      const ITEMS = [
        // type: 'price' | 'separator'
        { symbol: 'S&P 500', price: '7,600',    change: '+0.48%', direction: 'up'   },
        { symbol: 'NASDAQ',  price: '30,514',   change: '+0.96%', direction: 'up'   },
        { symbol: 'TA-125',  price: '4,204',    change: '-0.84%', direction: 'down' },
        { symbol: 'BTC',     price: '$69,510',  change: '-4.32%', direction: 'down' },
        { symbol: 'ETH',     price: '$1,980',   change: '-0.13%', direction: 'down' },
        { symbol: 'BNB',     price: '$678.62',  change: '-3.62%', direction: 'down' },
        { symbol: 'XRP',     price: '$1.26',    change: '-3.09%', direction: 'down' },
        { symbol: 'SOL',     price: '$79.27',   change: '-2.15%', direction: 'down' },
      ];
      const SEPARATOR = { kind: 'separator' };

      // Tunables
      const SPEED_PX_PER_SEC = 30;
      let fontSize = 0;          // computed from canvas height
      let badgeRadius = 0;
      let badgePaddingX = 0;
      let badgePaddingY = 0;
      let interItemGap = 0;
      let intraItemGap = 0;
      let separatorGap = 0;

      function resize() {
        // Match canvas backing store to display size (devicePixelRatio == 1
        // on the LED panel typically; we keep things 1:1 for predictability)
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;

        // Match the HTML scrolling version: clamp(28, 9vh, 96)
        // BUG FIX: previous version used 0.55 (55% of height) — way too big on
        // a tall-ish viewport, made everything "fat". Should be 0.09 (= 9vh).
        fontSize = Math.round(Math.max(28, Math.min(96, h * 0.09)));
        badgeRadius = Math.round(fontSize * 0.18);
        badgePaddingX = Math.round(fontSize * 0.35);
        badgePaddingY = Math.round(fontSize * 0.15);
        interItemGap = Math.round(fontSize * 1.4);   // between items
        intraItemGap = Math.round(fontSize * 0.5);   // within item (symbol→price, price→change)
        separatorGap = Math.round(fontSize * 1.5);   // around the logo separator
      }

      // Measure text width given font weight (faux loaded — Figtree may not be ready yet)
      function setFont(weight) {
        ctx.font = weight + ' ' + fontSize + 'px "Figtree", "Helvetica Neue", Arial, sans-serif';
      }

      // Pre-compute the width of one "item" so we know total cycle width
      function itemWidth(item) {
        if (item.kind === 'separator') {
          return separatorGap * 2 + Math.round(fontSize * 0.85);  // approx logo size
        }
        setFont('900');
        const wSymbol = ctx.measureText(item.symbol).width;
        setFont('600');
        const wPrice  = ctx.measureText(item.price).width;
        setFont('800');
        const wChange = ctx.measureText(item.change).width;
        return Math.round(
          wSymbol + intraItemGap +
          wPrice  + intraItemGap +
          (wChange + 2 * badgePaddingX) +
          interItemGap
        );
      }

      function roundedRect(x, y, w, h, r, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.fill();
      }

      // Load logo SVG into an Image so we can draw it on the canvas as a separator
      const logo = new Image();
      let logoReady = false;
      logo.onload = function () { logoReady = true; };
      logo.src = 'logo.svg';

      function drawItem(item, x, y) {
        if (item.kind === 'separator') {
          if (logoReady) {
            const h = Math.round(fontSize * 0.85);
            const w = h; // 1:1 aspect
            const lx = Math.round(x + separatorGap);
            const ly = Math.round(y - h / 2);
            ctx.globalAlpha = 0.85;
            ctx.drawImage(logo, lx, ly, w, h);
            ctx.globalAlpha = 1.0;
          }
          return;
        }
        let cursor = x;
        ctx.textBaseline = 'middle';
        // Symbol
        setFont('900');
        ctx.fillStyle = COLORS.text;
        ctx.fillText(item.symbol, Math.round(cursor), y);
        cursor += ctx.measureText(item.symbol).width + intraItemGap;
        // Price
        setFont('600');
        ctx.fillStyle = COLORS.text;
        ctx.fillText(item.price, Math.round(cursor), y);
        cursor += ctx.measureText(item.price).width + intraItemGap;
        // Change badge
        setFont('800');
        const changeWidth = ctx.measureText(item.change).width;
        const badgeWidth  = changeWidth + 2 * badgePaddingX;
        const badgeHeight = fontSize + 2 * badgePaddingY;
        const badgeColor = item.direction === 'up' ? COLORS.up : COLORS.down;
        roundedRect(
          Math.round(cursor),
          Math.round(y - badgeHeight / 2),
          Math.round(badgeWidth),
          Math.round(badgeHeight),
          badgeRadius,
          badgeColor
        );
        ctx.fillStyle = COLORS.text;
        ctx.fillText(item.change, Math.round(cursor + badgePaddingX), y);
      }

      let totalWidth = 0;
      const itemWidths = [];

      function precompute() {
        itemWidths.length = 0;
        totalWidth = 0;
        // Build a logical sequence: items + separator at the end (once per cycle)
        const seq = ITEMS.concat([SEPARATOR]);
        for (const it of seq) {
          const w = itemWidth(it);
          itemWidths.push(w);
          totalWidth += w;
        }
      }

      let startTime = null;
      function draw(now) {
        if (startTime === null) startTime = now;
        const elapsed = (now - startTime) / 1000;
        // Scroll: leftward (negative offset), modulo totalWidth for seamless loop
        const scrollOffset = -Math.round((elapsed * SPEED_PX_PER_SEC) % totalWidth);

        // Clear background
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const y = Math.round(canvas.height / 2);
        const seq = ITEMS.concat([SEPARATOR]);

        // Draw two copies of the sequence so when one slides off, the next is in view
        let cursor = scrollOffset;
        for (let copy = 0; copy < 2; copy++) {
          for (let i = 0; i < seq.length; i++) {
            // Skip drawing items that are entirely off-screen on the right
            if (cursor < canvas.width) {
              drawItem(seq[i], cursor, y);
            }
            cursor += itemWidths[i];
          }
        }

        requestAnimationFrame(draw);
      }

      function init() {
        resize();
        precompute();
        requestAnimationFrame(draw);
      }

      // Wait for Figtree to load (otherwise width measurements are wrong)
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function () { setTimeout(init, 100); });
      } else {
        setTimeout(init, 800);
      }
      window.addEventListener('resize', function () { resize(); precompute(); });
    })();
  </script>
</body>
</html>
